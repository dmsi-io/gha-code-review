name: 'build-test'
on: # rebuild any PRs and main branch changes
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'
      - 'feature/*'

jobs:
  test: # make sure the action works on a clean machine without building
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ./
        with:
          token: ${{ secrets.PUBLIC_GHA_ACCESS_TOKEN }}

      - uses: actions/checkout@v2
      - uses: ./
        with:
          token: ${{ secrets.PUBLIC_GHA_ACCESS_TOKEN }}
          changelog: false
          todos: false
